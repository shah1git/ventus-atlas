name: check-links

on:
  schedule:
    # Mondays at 06:00 UTC. Catches link rot from the prior week.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run link checker
        id: check
        # Capture stdout (markdown report) AND keep the exit code so we can
        # decide whether to open an issue. Always allow the job to continue
        # so the issue gets created even when broken links exit non-zero.
        run: |
          set +e
          node scripts/check-links.mjs > /tmp/link-report.md 2> /tmp/link-checker.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "--- stderr ---"
          cat /tmp/link-checker.log
          echo "--- report ---"
          cat /tmp/link-report.md

      - name: Open / update / close issue based on link health
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.check.outputs.exit_code }}';
            const broken = exitCode !== '0';
            const body = fs.readFileSync('/tmp/link-report.md', 'utf8');
            const title = 'Source link health — broken URLs detected';

            // Find existing open issue by title (label-less to keep setup simple).
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const found = existing.find(i => i.title === title);

            if (broken) {
              // Open or refresh the issue
              if (found) {
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: found.number, body,
                });
                console.log(`Updated issue #${found.number}`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title, body,
                });
                console.log(`Created issue #${created.number}`);
              }
            } else if (found) {
              // All clean now — comment + close the existing tracking issue
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: found.number,
                body: '✅ All broken links resolved. Closing automatically.\n\n' + body,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: found.number, state: 'closed',
              });
              console.log(`Closed issue #${found.number}`);
            } else {
              console.log('No broken links and no existing issue — nothing to do.');
            }
