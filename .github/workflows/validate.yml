name: validate

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/validate-data.mjs'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate-data.mjs'
      - '.github/workflows/validate.yml'

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate scopes.json + sources.json
        run: node scripts/validate-data.mjs
